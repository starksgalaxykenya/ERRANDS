<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ERRANDS Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div id="admin-app" class="admin-container">
        <aside class="admin-sidebar">
            <h2>ERRANDS Admin</h2>
            <nav>
                <a href="#/admin/dashboard" class="active">Dashboard</a>
                <a href="#/admin/users">Users</a>
                <a href="#/admin/errands">Errands</a>
                <a href="#/admin/disputes">Disputes</a>
                <a href="#/admin/kyc">KYC</a>
                <a href="#/admin/settings">Settings</a>
                <a href="#" id="admin-logout">Logout</a>
            </nav>
        </aside>
        <main id="admin-main" class="admin-main">
            <!-- content loaded by Admin.js -->
        </main>
    </div>
    <!-- Firebase and scripts same as index but with admin-specific -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // Initialize admin on load
        window.addEventListener('load', () => {
            if (window.firebaseAuth.currentUser) {
                Admin.init();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
