<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERRANDS - Your Personal Errand Service</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loader">
                <i class="fas fa-running fa-3x"></i>
                <h2>ERRANDS</h2>
                <p>Loading...</p>
            </div>
        </div>

        <!-- Auth Container -->
        <div id="auth-container" class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <i class="fas fa-running fa-2x"></i>
                    <h1>ERRANDS</h1>
                    <p>Your Personal Errand Service</p>
                </div>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <p class="auth-link">
                        <a href="#" id="forgot-password">Forgot Password?</a>
                    </p>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="reg-phone">Phone Number</label>
                        <input type="tel" id="reg-phone" required placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="Create a password">
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm-password">Confirm Password</label>
                        <input type="password" id="reg-confirm-password" required placeholder="Confirm your password">
                    </div>
                    <div class="form-group">
                        <label for="reg-role">I want to</label>
                        <select id="reg-role" required>
                            <option value="">Select role</option>
                            <option value="client">Request Errands</option>
                            <option value="runner">Run Errands</option>
                            <option value="both">Both</option>
                        </select>
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <!-- Social Login -->
                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-buttons">
                        <button class="btn-social google">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="btn-social facebook">
                            <i class="fab fa-facebook"></i> Facebook
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main App Container -->
        <div id="main-container" class="main-container" style="display: none;">
            <!-- Header will be loaded dynamically -->
            <div id="header-container"></div>
            
            <!-- Main Content -->
            <div id="main-content" class="main-content">
                <!-- Content will be loaded dynamically based on routing -->
            </div>
            
            <!-- Footer -->
            <div id="footer-container"></div>
        </div>

        <!-- Admin Container -->
        <div id="admin-container" class="admin-container" style="display: none;">
            <!-- Admin panel will be loaded here -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        import { getStorage } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";
        import { getFunctions } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-functions.js";
        import { getMessaging } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8G1kc5zHY6BD6y1OeSzmZLePV6hzSjMk",
            authDomain: "finance-report-246b1.firebaseapp.com",
            projectId: "finance-report-246b1",
            storageBucket: "finance-report-246b1.firebasestorage.app",
            messagingSenderId: "506353861080",
            appId: "1:506353861080:web:26d625b71c10ab29d9b2ad"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const functions = getFunctions(app);
        const messaging = getMessaging(app);

        // Make Firebase instances globally available
        window.firebaseApp = app;
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseStorage = storage;
        window.firebaseFunctions = functions;
        window.firebaseMessaging = messaging;
    </script>

    <!-- Application Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user.js"></script>
    <script src="js/errands.js"></script>
    <script src="js/bids.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/payments.js"></script>
    <script src="js/rating.js"></script>
    <script src="js/kyc.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
